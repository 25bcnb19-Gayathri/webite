<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JobFinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container { display: flex; min-height: 100vh; padding-top: 80px; }
        .sidebar { width: 250px; background: var(--white); border-right: 1px solid var(--gray-border); padding: 30px 0; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; padding: 15px 30px; color: var(--text-slate-light); font-weight: 500; cursor: pointer; transition: var(--transition); }
        .sidebar-link:hover, .sidebar-link.active { background: var(--bg-light); color: var(--primary); border-right: 3px solid var(--primary); }
        .main-content { flex: 1; padding: 40px; background: #fdfdfd; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: var(--radius-md); border: 1px solid var(--gray-border); text-align: center; }
        .stat-card h3 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; }
        .stat-card p { color: var(--text-slate-light); font-size: 0.9rem; font-weight: 500; }
        .table-container { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--gray-border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: var(--bg-light); padding: 15px 20px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-slate-light); }
        td { padding: 15px 20px; border-top: 1px solid var(--gray-border); font-size: 0.9rem; }
        .badge { padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .badge-it { background: #e0f2fe; color: #0369a1; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .admin-form { max-width: 600px; background: var(--white); padding: 30px; border-radius: var(--radius-md); border: 1px solid var(--gray-border); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container container-nav">
            <a href="index.html" class="logo">
                <span class="icon-box"><i class="fas fa-briefcase"></i></span>
                JobFinder Admin
            </a>
            <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                <span id="admin-name" style="font-weight: 600;">Admin</span>
                <a href="index.html" class="btn-secondary" style="font-size: 0.8rem; padding: 5px 15px;">Logout</a>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-link" onclick="showTab('overview', this)"><i class="fas fa-chart-line"></i> Overview</div>
            <div class="sidebar-link active" onclick="showTab('applications', this)"><i class="fas fa-users"></i> Applications</div>
            <div class="sidebar-link" onclick="showTab('jobs-manage', this)"><i class="fas fa-plus-circle"></i> Add New Job</div>
        </aside>

        <main class="main-content">
            <!-- Overview Tab -->
            <div id="overview" class="tab-content">
                <h2 class="section-title">Admin Overview</h2>
                <div class="stats-grid" style="margin-top: 30px;">
                    <div class="stat-card">
                        <h3 id="stat-jobs">0</h3>
                        <p>Active Jobs</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="stat-apps">0</h3>
                        <p>Total Applications</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="stat-users">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
            </div>

            <!-- Applications Tab -->
            <div id="applications" class="tab-content active">
                <h2 class="section-title">Manage Applications</h2>
                <div class="table-container" style="margin-top: 30px;">
                    <table>
                        <thead>
                            <tr>
                                <th>Applicant Details</th>
                                <th>Experience</th>
                                <th>Job Applied</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="apps-table-body">
                            <!-- JS injected -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Add Job Tab -->
            <div id="jobs-manage" class="tab-content">
                <h2 class="section-title">Post New Opportunity</h2>
                <form id="add-job-form" class="admin-form" style="margin-top: 30px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Job Title</label>
                            <input type="text" id="job-title" class="btn-light" style="width: 100%; border: 1px solid #ddd; padding: 10px;" required>
                        </div>
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" id="job-company" class="btn-light" style="width: 100%; border: 1px solid #ddd; padding: 10px;" required>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="job-location" class="btn-light" style="width: 100%; border: 1px solid #ddd; padding: 10px;" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="job-category" style="width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
                                <option value="IT">Information Technology</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Finance">Finance</option>
                                <option value="Design">Design</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <div class="form-group">
                            <label>Salary Range</label>
                            <input type="text" id="job-salary" placeholder="$50k - $80k" class="btn-light" style="width: 100%; border: 1px solid #ddd; padding: 10px;" required>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <div class="form-group">
                            <label>Job Description</label>
                            <textarea id="job-desc" rows="4" style="width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px;" required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%;">Create Job Posting</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Check Auth
        const storedUser = JSON.parse(localStorage.getItem('user'));
        if (!storedUser || storedUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        document.getElementById('admin-name').textContent = storedUser.name;

        // Logout
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (el) el.classList.add('active');
        }

        async function updateStatus(appId, status) {
            const res = await fetch(`http://localhost:5000/api/applications/${appId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (res.ok) {
                loadDashboard();
            }
        }

        // Fetch Data
        async function loadDashboard() {
            const [jobsRes, appsRes] = await Promise.all([
                fetch('http://localhost:5000/api/jobs'),
                fetch('http://localhost:5000/api/applications')
            ]);
            const jobs = await jobsRes.json();
            const apps = await appsRes.json();

            document.getElementById('stat-jobs').textContent = jobs.length;
            document.getElementById('stat-apps').textContent = apps.length;
            
            const tableBody = document.getElementById('apps-table-body');
            tableBody.innerHTML = apps.map(app => `
                <tr>
                    <td>
                        <strong>${app.applicantName}</strong><br>
                        <small>${app.applicantEmail}</small><br>
                        <small>${app.phone || 'N/A'}</small>
                    </td>
                    <td>${app.experience || '0'} Years</td>
                    <td>${app.jobTitle}<br><small>${app.company}</small></td>
                    <td>
                        <span class="badge ${app.status === 'Accepted' ? 'badge-it' : (app.status === 'Rejected' ? 'badge-rejected' : 'badge-pending')}">
                            ${app.status || 'Pending'}
                        </span>
                    </td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            ${app.resume ? `<a href="${app.resume}" download="${app.resumeName || 'resume.pdf'}" class="btn-secondary" style="padding: 5px 8px; font-size: 0.7rem;"><i class="fas fa-file-pdf"></i> Download</a>` : '<small>No file</small>'}
                            <button onclick="updateStatus('${app.id}', 'Accepted')" class="btn-primary" style="padding: 5px 8px; font-size: 0.7rem; background: #10b981;">Accept</button>
                            <button onclick="updateStatus('${app.id}', 'Rejected')" class="btn-primary" style="padding: 5px 8px; font-size: 0.7rem; background: #ef4444;">Reject</button>
                        </div>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" style="text-align:center;">No applications yet.</td></tr>';
        }

        // Handle Add Job
        document.getElementById('add-job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const jobData = {
                title: document.getElementById('job-title').value,
                company: document.getElementById('job-company').value,
                location: document.getElementById('job-location').value,
                category: document.getElementById('job-category').value,
                salary: document.getElementById('job-salary').value,
                desc: document.getElementById('job-desc').value,
                type: 'Full-time'
            };

            const res = await fetch('http://localhost:5000/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(jobData)
            });

            if (res.ok) {
                alert('Job posted successfully!');
                e.target.reset();
                loadDashboard();
                showTab('overview');
            }
        });

        loadDashboard();
    </script>
</body>
</html>
